services:
  - type: worker
    name: digital-confession-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: TEAM_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.7
